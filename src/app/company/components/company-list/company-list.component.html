<div class="d-flex justify-content-left align-items-left">
    <div class="company-card p-4 rounded-4">
        <div class="d-flex">
            <img src="assets/images/sidebar-icons/company_logo.png" style="width: 80px;">
            <h2 class="mt-3">{{currentCompany.legalName}}</h2>
        </div>
        <div class="mb-3">
            <p>{{currentCompany.summary}}</p>
        </div>
        <div class="mb-3">
            <p><b>Industry:</b> {{getIndustryName(currentCompany.industry)}}</p>
            <p><b>location:</b> {{getLocationName(currentCompany.location)}}</p>
            <p><b>Address:</b> {{currentCompany.address}}</p>
        </div>
        <div class="d-flex" style="gap: 40px;">
            <div class="d-flex mb-2" style="gap: 10px;">
                <img src="assets/images/company/email.png" style="width: 30px;"> <p style="color: gray;font-weight: bold;">{{currentCompany.email}}</p>
            </div>
            <div class="d-flex mb-2" style="gap: 10px;">
                <img src="assets/images/company/phone.jpg" style="width: 30px;"> <p style="color: gray;font-weight: bold;">{{currentCompany.phone}}</p>
            </div>
            <div class="d-flex mb-2" style="gap: 10px;">
                <img src="assets/images/company/website.png" style="width: 30px;"> <p style="color: gray;font-weight: bold;">{{currentCompany.website}}</p>
            </div>
        </div>
        <div class="d-flex mt-4 w-150">
            <button class="btn btn-primary" (click)="onUpdate(currentCompany.id)" >Edit</button>
        </div>
    </div>
</div>
